name: Version Bump

on:
  push:
    branches: [main]

jobs:
  bump:
    # Don't re-run on the version bump commit itself
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the push can include tags
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump type
        id: bump-type
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -qF '[major]'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -qF '[minor]'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: bump
        run: |
          chmod +x scripts/bump_version.sh
          NEW=$(scripts/bump_version.sh "${{ steps.bump-type.outputs.type }}")
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml admin-dashboard/package.json k8s/base/kustomization.yaml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin main --follow-tags
