---
apiVersion: v1
kind: Service
metadata:
  name: websearch-api
  namespace: websearch-api
  labels:
    app: websearch-api
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: websearch-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: websearch-api
  namespace: websearch-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: websearch-api
  template:
    metadata:
      labels:
        app: websearch-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: websearch-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: websearch-api-config
          env:
            - name: PORT
              value: "8000"
            - name: KEYCLOAK_URL
              value: "http://keycloak.keycloak.svc.cluster.local:8080"
            - name: KEYCLOAK_REALM
              value: "websearch"
            - name: KEYCLOAK_CLIENT_ID
              value: "websearch-api"
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-credentials
                  key: KEYCLOAK_CLIENT_SECRET
                  optional: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
