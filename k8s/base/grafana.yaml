---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: websearch-api
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090/prometheus
        uid: prometheus
        isDefault: true
        editable: true
        jsonData:
          timeInterval: "15s"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: websearch-api
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-websearch
  namespace: websearch-api
data:
  websearch-api-overview.json: |
    {
      "title": "WebSearch API - System Overview",
      "uid": "websearch-api-overview",
      "tags": ["websearch", "api", "overview"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 2,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "type": "timeseries",
          "title": "HTTP Requests per Second",
          "targets": [
            {
              "expr": "rate(http_server_requests_total[1m])",
              "legendFormat": "{{method}} {{endpoint}}",
              "refId": "A",
              "datasource": {"type": "prometheus", "uid": "prometheus"}
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2, "fillOpacity": 10},
              "unit": "reqps"
            }
          },
          "options": {
            "tooltip": {"mode": "multi"},
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}
          }
        },
        {
          "id": 2,
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "type": "timeseries",
          "title": "HTTP Response Times",
          "targets": [
            {
              "expr": "http_server_duration_milliseconds_sum / http_server_duration_milliseconds_count",
              "legendFormat": "Average Duration",
              "refId": "A",
              "datasource": {"type": "prometheus", "uid": "prometheus"}
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2, "fillOpacity": 10},
              "unit": "ms"
            }
          },
          "options": {
            "tooltip": {"mode": "multi"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          }
        },
        {
          "id": 3,
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 8},
          "type": "stat",
          "title": "Total Requests",
          "targets": [
            {
              "expr": "sum(http_server_requests_total)",
              "refId": "A",
              "datasource": {"type": "prometheus", "uid": "prometheus"}
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"value": null, "color": "green"},
                  {"value": 100, "color": "yellow"},
                  {"value": 1000, "color": "red"}
                ]
              },
              "unit": "short"
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "value",
            "graphMode": "area"
          }
        },
        {
          "id": 4,
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 8},
          "type": "stat",
          "title": "Error Rate",
          "targets": [
            {
              "expr": "sum(http_server_requests_total{status_code=~\"4..|5..\"}) / sum(http_server_requests_total) * 100",
              "refId": "A",
              "datasource": {"type": "prometheus", "uid": "prometheus"}
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"value": null, "color": "green"},
                  {"value": 1, "color": "yellow"},
                  {"value": 5, "color": "red"}
                ]
              },
              "unit": "percent",
              "noValue": "0"
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "value",
            "graphMode": "area"
          }
        },
        {
          "id": 5,
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 8},
          "type": "stat",
          "title": "Active Requests",
          "targets": [
            {
              "expr": "http_server_active_requests",
              "refId": "A",
              "datasource": {"type": "prometheus", "uid": "prometheus"}
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"value": null, "color": "green"},
                  {"value": 10, "color": "yellow"},
                  {"value": 50, "color": "red"}
                ]
              },
              "unit": "short"
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "value",
            "graphMode": "area"
          }
        },
        {
          "id": 6,
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "type": "timeseries",
          "title": "HTTP Status Codes",
          "targets": [
            {
              "expr": "sum by (status_code) (rate(http_server_requests_total[1m]))",
              "legendFormat": "{{status_code}}",
              "refId": "A",
              "datasource": {"type": "prometheus", "uid": "prometheus"}
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2, "fillOpacity": 10, "stacking": {"mode": "normal"}},
              "unit": "reqps"
            }
          },
          "options": {
            "tooltip": {"mode": "multi"},
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["sum"]}
          }
        },
        {
          "id": 7,
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "type": "timeseries",
          "title": "Request Rate by Endpoint",
          "targets": [
            {
              "expr": "sum by (endpoint) (rate(http_server_requests_total[1m]))",
              "legendFormat": "{{endpoint}}",
              "refId": "A",
              "datasource": {"type": "prometheus", "uid": "prometheus"}
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2, "fillOpacity": 10},
              "unit": "reqps"
            }
          },
          "options": {
            "tooltip": {"mode": "multi"},
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}
          }
        },
        {
          "id": 10,
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 24},
          "type": "table",
          "title": "Top Endpoints by Request Count",
          "targets": [
            {
              "expr": "topk(10, sum by (endpoint, method) (http_server_requests_total))",
              "refId": "A",
              "format": "table",
              "instant": true,
              "datasource": {"type": "prometheus", "uid": "prometheus"}
            }
          ],
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Value"},
                "properties": [
                  {"id": "displayName", "value": "Request Count"},
                  {"id": "unit", "value": "short"},
                  {"id": "decimals", "value": 0}
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [{"desc": true, "displayName": "Request Count"}]
          }
        }
      ]
    }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: websearch-api
  labels:
    app: grafana
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: 3000
  selector:
    app: grafana
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: websearch-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "http://localhost/grafana"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboard-websearch
              mountPath: /var/lib/grafana/dashboards
            - name: grafana-data
              mountPath: /var/lib/grafana/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboards-config
          configMap:
            name: grafana-dashboards-config
        - name: grafana-dashboard-websearch
          configMap:
            name: grafana-dashboard-websearch
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: websearch-api
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
