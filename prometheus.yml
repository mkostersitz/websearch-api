global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'websearch-api'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: '/metrics'

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['websearch-otel-collector:8888']
  
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
